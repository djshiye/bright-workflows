name: Bright Scan - project-level entrypoints

on:
  workflow_dispatch:
    inputs:
      scan_name:
        description: "Scan name shown in the Bright dashboard"
        required: false
        default: "brokencrystals entrypoints scan"
      severity:
        description: "Fail the job on first issue of this severity or higher"
        required: true
        default: "high"
        type: choice
        options:
          - any
          - medium
          - high
          - critical
      timeout_seconds:
        description: "How long to wait for issues before exiting"
        required: false
        default: "3600"
      project_id:
        description: "Bright project ID (leave blank to use repo var BRIGHT_PROJECT_ID)"
        required: false
        default: ""
      entrypoint_statuses:
        description: "Comma-separated entrypoint security statuses to include"
        required: false
        default: "new,changed,vulnerable"
      entrypoint_limit:
        description: "Max number of entrypoints to pull"
        required: false
        default: "500"

permissions:
  contents: read
  security-events: write

jobs:
  bright:
    name: Entrypoints DAST scan
    runs-on: ubuntu-latest
    steps:
      - name: Resolve project ID
        id: project
        run: |
          PID="${{ inputs.project_id }}"
          if [ -z "$PID" ]; then PID="${{ vars.BRIGHT_PROJECT_ID }}"; fi
          if [ -z "$PID" ]; then
            echo "::error::No project ID supplied (input blank and vars.BRIGHT_PROJECT_ID unset)."
            exit 1
          fi
          echo "id=$PID" >> "$GITHUB_OUTPUT"
          echo "Using project: $PID"

      - name: List entrypoints (new, changed, vulnerable)
        id: entrypoints
        uses: NeuraLegion/list-entrypoints@v1.1
        with:
          api_token: ${{ secrets.BRIGHT_TOKEN }}
          project_id: ${{ steps.project.outputs.id }}
          status: ${{ inputs.entrypoint_statuses }}
          limit: ${{ inputs.entrypoint_limit }}
          ids_only: 'true'

      - name: Guard - fail if no entrypoints matched
        env:
          IDS: ${{ steps.entrypoints.outputs.entrypoints }}
        run: |
          COUNT=$(echo "$IDS" | jq 'length')
          echo "Matched $COUNT entrypoints with status '${{ inputs.entrypoint_statuses }}'"
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::No entrypoints matched - nothing to scan. Discover entrypoints first (HAR/OAS/crawler) and re-run."
            exit 1
          fi

      - name: Start Bright scan (all 53 tests)
        id: start
        uses: NeuraLegion/run-scan@v1.4
        with:
          api_token: ${{ secrets.BRIGHT_TOKEN }}
          name: ${{ inputs.scan_name }} ${{ github.sha }}
          project_id: ${{ steps.project.outputs.id }}
          entrypoints: ${{ steps.entrypoints.outputs.entrypoints }}
          module: dast
          tests: |
            ["amazon_s3_takeover","bopla","broken_saml_auth","brute_force_login","business_constraint_bypass","common_files","cookie_security","csrf","css_injection","cve_test","date_manipulation","default_login_location","directory_listing","email_injection","excessive_data_exposure","file_upload","full_path_disclosure","graphql_introspection","header_security","html_injection","http_method_fuzzing","id_enumeration","iframe_injection","improper_asset_management","insecure_output_handling","insecure_tls_configuration","jwt","ldapi","lfi","nosql","open_cloud_storage","open_database","osi","prompt_injection","proto_pollution","retire_js","rfi","secret_tokens","server_side_js_injection","sqli","ssrf","ssti","stored_xss","unvalidated_redirect","version_control_systems","wordpress","xpathi","xss","xxe"]

      - name: Show scan URL
        run: echo "Scan started - ${{ steps.start.outputs.url }}"

      - name: Wait for issues
        uses: NeuraLegion/wait-for@v1.1
        with:
          api_token: ${{ secrets.BRIGHT_TOKEN }}
          scan: ${{ steps.start.outputs.id }}
          wait_for: ${{ inputs.severity }}
          timeout: ${{ inputs.timeout_seconds }}
          stop_scan: true
          code_scanning_alerts: true
