name: Bright Discovery - HAR

on:
  workflow_dispatch:
    inputs:
      file_id:
        description: "Bright file ID of the HAR archive (leave blank to use repo var BRIGHT_HAR_FILE_ID)"
        required: false
        default: ""
      discovery_name:
        description: "Discovery name shown in Bright"
        required: false
        default: "HAR discovery"
      auth_object_id:
        description: "Auth object ID (leave blank to use repo var BRIGHT_AUTH_OBJECT_ID, or blank for anonymous)"
        required: false
        default: ""
      project_id:
        description: "Bright project ID (leave blank to use repo var BRIGHT_PROJECT_ID)"
        required: false
        default: ""
      hosts_filter:
        description: "Comma-separated list of hosts from the HAR to include (leave blank for all)"
        required: false
        default: ""
      wait_timeout_seconds:
        description: "How long to wait for discovery to finish"
        required: false
        default: "1800"

permissions:
  contents: read

jobs:
  discover:
    name: HAR discovery
    runs-on: ubuntu-latest
    steps:
      - name: Resolve IDs
        id: ids
        run: |
          PID="${{ inputs.project_id }}"
          [ -z "$PID" ] && PID="${{ vars.BRIGHT_PROJECT_ID }}"
          if [ -z "$PID" ]; then echo "::error::No project ID"; exit 1; fi
          AID="${{ inputs.auth_object_id }}"
          [ -z "$AID" ] && AID="${{ vars.BRIGHT_AUTH_OBJECT_ID }}"
          FID="${{ inputs.file_id }}"
          [ -z "$FID" ] && FID="${{ vars.BRIGHT_HAR_FILE_ID }}"
          if [ -z "$FID" ]; then echo "::error::No HAR file_id supplied"; exit 1; fi
          echo "project=$PID" >> "$GITHUB_OUTPUT"
          echo "auth=$AID"     >> "$GITHUB_OUTPUT"
          echo "file=$FID"     >> "$GITHUB_OUTPUT"
          echo "Project=$PID Auth=${AID:-<anonymous>} File=$FID"

      - name: Build hosts_filter JSON
        id: hosts
        run: |
          IN="${{ inputs.hosts_filter }}"
          if [ -z "$IN" ]; then
            echo "value=[]" >> "$GITHUB_OUTPUT"
          else
            JSON=$(printf '%s' "$IN" | jq -Rc 'split(",") | map(gsub("^\\s+|\\s+$"; ""))')
            echo "value=$JSON" >> "$GITHUB_OUTPUT"
          fi

      - name: Start HAR discovery
        id: start
        uses: NeuraLegion/run-discovery@v1.1
        with:
          api_token: ${{ secrets.BRIGHT_TOKEN }}
          name: ${{ inputs.discovery_name }} ${{ github.sha }}
          project_id: ${{ steps.ids.outputs.project }}
          auth_object_id: ${{ steps.ids.outputs.auth }}
          discovery_types: |
            ["archive"]
          file_id: ${{ steps.ids.outputs.file }}
          hosts_filter: ${{ steps.hosts.outputs.value }}

      - name: Show discovery URL
        run: echo "Discovery - ${{ steps.start.outputs.url }}"

      - name: Wait for discovery
        uses: NeuraLegion/wait-for-discovery@v1
        with:
          api_token: ${{ secrets.BRIGHT_TOKEN }}
          discovery_id: ${{ steps.start.outputs.id }}
          project_id: ${{ steps.ids.outputs.project }}
          timeout: ${{ inputs.wait_timeout_seconds }}
